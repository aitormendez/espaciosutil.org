---
- name: Check active theme
  command: wp theme list --status=active --field=name
  args:
    chdir: "{{ deploy_helper.new_release_path }}"
  register: wp_active_themes
  changed_when: false

- name: Clear Acorn caches
  command: wp acorn optimize:clear
  args:
    chdir: "{{ deploy_helper.new_release_path }}"
  when: "'sage' in wp_active_themes.stdout_lines"

- name: Optimize Acorn
  command: wp acorn optimize
  args:
    chdir: "{{ deploy_helper.new_release_path }}"
  when: "'sage' in wp_active_themes.stdout_lines"
