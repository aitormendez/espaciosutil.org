---
- name: Check whether WordPress is installed
  command: wp core is-installed --skip-plugins --skip-themes
  args:
    chdir: "{{ deploy_helper.new_release_path }}"
  register: wp_core_is_installed
  changed_when: false
  failed_when: false

- name: Check active theme
  command: wp theme list --status=active --field=name
  args:
    chdir: "{{ deploy_helper.new_release_path }}"
  register: wp_active_themes
  changed_when: false
  when: wp_core_is_installed.rc == 0

- name: Clear Acorn caches
  command: wp acorn optimize:clear
  args:
    chdir: "{{ deploy_helper.new_release_path }}"
  when:
    - wp_core_is_installed.rc == 0
    - "'sage' in wp_active_themes.stdout_lines"

- name: Optimize Acorn
  command: wp acorn optimize
  args:
    chdir: "{{ deploy_helper.new_release_path }}"
  when:
    - wp_core_is_installed.rc == 0
    - "'sage' in wp_active_themes.stdout_lines"
